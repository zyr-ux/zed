name: Sync and Release

on:
  workflow_dispatch:
  schedule:
    # Runs at 00:00 UTC everyday
    - cron: '0 0 * * *'

concurrency:
  group: zed-release
  cancel-in-progress: false

permissions:
  contents: write

env:
  ZED_UPDATE_REPO: ${{ github.repository }}

jobs:
  sync_main:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_build: ${{ steps.check_updates.outputs.should_build }}
      upstream_tag: ${{ steps.get_version.outputs.upstream_tag }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with upstream main and check for updates
        id: check_updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/zed-industries/zed.git || true
          git fetch upstream main --tags
          
          # Merge updates from upstream
          git checkout main
          git merge upstream/main --no-edit
          
          # Fetch origin to verify new commits
          git fetch origin main || true
          LOCAL_SHA=$(git rev-parse HEAD)
          ORIGIN_SHA=$(git rev-parse origin/main 2>/dev/null || echo "")
          
          if [ "$LOCAL_SHA" != "$ORIGIN_SHA" ]; then
            echo "New commits detected. Pushing merged updates to origin main."
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git main
          else
            echo "No new commits to push."
          fi
          
          VERSION=$(script/get-crate-version zed)
          
          SHOULD_BUILD="false"
          # Check if the release for this version already exists in our repository
          if gh release view "v${VERSION}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists in ${REPOSITORY}. Skipping build/release."
          else
            echo "Release v${VERSION} does not exist in ${REPOSITORY}. Triggering build/release."
            SHOULD_BUILD="true"
          fi
          
          echo "should_build=${SHOULD_BUILD}" >> "$GITHUB_OUTPUT"

      - name: Get version
        id: get_version
        run: |
          VERSION=$(script/get-crate-version zed)
          UPSTREAM_TAG=$(git describe --tags --abbrev=0 upstream/main 2>/dev/null || echo "v${VERSION}")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=${UPSTREAM_TAG}" >> "$GITHUB_OUTPUT"

  build:
    needs: sync_main
    if: needs.sync_main.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x86_64
            client_path: target/release/zed-linux-x86_64.tar.gz
            server_path: target/zed-remote-server-linux-x86_64.gz

          # Linux ARM64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: aarch64
            client_path: target/release/zed-linux-aarch64.tar.gz
            server_path: target/zed-remote-server-linux-aarch64.gz
            
          # macOS ARM64 (Apple Silicon)
          - os: macos-15
            target: aarch64-apple-darwin
            arch: aarch64
            macosx_deployment_target: "11.0"
            client_path: target/aarch64-apple-darwin/release/Zed-aarch64.dmg
            server_path: target/zed-remote-server-macos-aarch64.gz
            
          # macOS x86_64 (Intel)
          - os: macos-15
            target: x86_64-apple-darwin
            arch: x86_64
            macosx_deployment_target: "10.15.7"
            client_path: target/x86_64-apple-darwin/release/Zed-x86_64.dmg
            server_path: target/zed-remote-server-macos-x86_64.gz

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64
            client_path: target/Zed-x86_64.exe
            server_path: target/zed-remote-server-windows-x86_64.zip

          # Windows ARM64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            arch: aarch64
            client_path: target/Zed-aarch64.exe
            server_path: target/zed-remote-server-windows-aarch64.zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Enable Windows and Git Long Paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Enable Git long paths support
          git config --system core.longpaths true
          git config --global core.longpaths true
          
          # Enable Windows Long Paths registry setting
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust Build
        uses: swatinem/rust-cache@v2
        with:
          shared-key: "zed-build"

      - name: Set Release Channel
        shell: bash
        run: |
          echo -n "stable" > crates/zed/RELEASE_CHANNEL

      # Linux-specific setup and build
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo ./script/linux
          ./script/download-wasi-sdk
      - name: Build Linux bundle
        if: runner.os == 'Linux'
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CC_aarch64_unknown_linux_musl: musl-gcc
        run: |
          ./script/bundle-linux

      # macOS-specific setup and build
      - name: Setup Node.js (Mac)
        if: runner.os == 'macOS'
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake
      - name: Pin cxx to avoid Xcode 15+ template errors
        if: runner.os == 'macOS'
        run: |
          cargo update -p cxx --precise 1.0.138
      - name: Disable Spotlight indexing
        if: runner.os == 'macOS'
        run: |
          sudo mdutil -a -i off || true
      - name: Build macOS bundle
        if: runner.os == 'macOS'
        env:
          TARGET: ${{ matrix.target }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
        run: |
          success=false
          for i in 1 2 3; do
            if ./script/bundle-mac ${TARGET}; then
              success=true
              break
            fi
            echo "Attempt $i failed, waiting 10 seconds before retrying..."
            sleep 10
          done
          if [ "$success" = "false" ]; then
            echo "All compilation and bundling attempts failed."
            exit 1
          fi

      # Windows-specific build
      - name: Link Visual Studio and Windows SDK paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath
          if ($vsPath) {
            $communityPath = "C:\Program Files\Microsoft Visual Studio\2022\Community"
            if (-not (Test-Path $communityPath)) {
              $parentDir = Split-Path $communityPath
              if (-not (Test-Path $parentDir)) {
                New-Item -ItemType Directory -Path $parentDir -Force | Out-Null
              }
              New-Item -ItemType Junction -Path $communityPath -Value $vsPath | Out-Null
              Write-Host "Created Junction: $communityPath -> $vsPath"
            }
          }
          $sdkParent = "C:\Program Files (x86)\Windows Kits\10\bin"
          if (Test-Path $sdkParent) {
            $expectedPath = Join-Path $sdkParent "10.0.26100.0"
            if (-not (Test-Path $expectedPath)) {
              $latest = Get-ChildItem -Path $sdkParent -Filter "10.*" | Where-Object { $_.PSIsContainer } | Sort-Object Name -Descending | Select-Object -First 1
              if ($latest) {
                New-Item -ItemType Junction -Path $expectedPath -Value $latest.FullName | Out-Null
                Write-Host "Linked Windows SDK: $expectedPath -> $($latest.FullName)"
              }
            }
          }

      - name: Build Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CI: "" # Clear CI variable to bypass signing requirements
          RELEASE_VERSION: ${{ needs.sync_main.outputs.version }}
          ZED_RELEASE_CHANNEL: "stable"
          ARCH: ${{ matrix.arch }}
        run: |
          script/bundle-windows.ps1 -Architecture $env:ARCH

      - name: Stage Release Artifacts
        shell: bash
        run: |
          mkdir -p release-staging
          cp "${{ matrix.client_path }}" release-staging/
          cp "${{ matrix.server_path }}" release-staging/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zed-${{ matrix.target }}
          path: release-staging/
          if-no-files-found: error

  publish_releases:
    needs: [sync_main, build]
    if: needs.sync_main.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Organize artifacts
        run: |
          mkdir -p release-files
          
          # Copy all built packages to a single directory
          cp all-artifacts/zed-*/zed-linux-*.tar.gz release-files/ 2>/dev/null || true
          cp all-artifacts/zed-*/Zed-*.dmg release-files/ 2>/dev/null || true
          cp all-artifacts/zed-*/Zed-*.exe release-files/ 2>/dev/null || true
          cp all-artifacts/zed-*/zed-remote-server-*.gz release-files/ 2>/dev/null || true
          cp all-artifacts/zed-*/zed-remote-server-*.zip release-files/ 2>/dev/null || true

          echo "Organized Files for Release:"
          ls -l release-files/ || true

      - name: Publish Stable Release (Latest)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.sync_main.outputs.version }}
          UPSTREAM_TAG: ${{ needs.sync_main.outputs.upstream_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$(ls -A release-files)" ]; then
            if gh release view "v${VERSION}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
              echo "Release v${VERSION} already exists. Uploading and replacing assets."
              gh release upload "v${VERSION}" release-files/* --repo "${REPOSITORY}" --clobber
              
              # Force update tag to point to the built commit
              git config --global user.name "github-actions[bot]"
              git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag -f "v${VERSION}" HEAD
              git push https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git "v${VERSION}" --force
            else
              echo "Creating new release v${VERSION}."
              gh release create "v${VERSION}" \
                --repo "${REPOSITORY}" \
                --title "Zed v${VERSION}" \
                --notes "Build synced with the official upstream Zed release. All changes and features from upstream version ${UPSTREAM_TAG} have been successfully applied." \
                release-files/*
            fi
          else
            echo "No release artifacts found to upload."
          fi